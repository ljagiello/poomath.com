<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#15111c" />
		<!-- Google Analytics (GA4). Guarded to the production host so local dev
		     and Vercel preview deploys don't pollute the stats. -->
		<script>
			if (
				location.hostname === 'poomath.com' ||
				location.hostname.endsWith('.poomath.com')
			) {
				window.dataLayer = window.dataLayer || [];
				window.gtag = function () {
					dataLayer.push(arguments);
				};
				gtag('js', new Date());
				gtag('config', 'G-66CSJLP1ZL');

				const s = document.createElement('script');
				s.async = true;
				s.src = 'https://www.googletagmanager.com/gtag/js?id=G-66CSJLP1ZL';
				document.head.appendChild(s);
			}
		</script>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/syne-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/space-grotesk-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
